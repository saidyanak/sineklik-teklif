name: sineklik_teklif
description: "Sineklik Teklif - Maliyet Hesaplama Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  pdf: ^3.11.1
  printing: ^5.14.0
  share_plus: ^10.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo.jpeg
    - assets/NotoSans-Regular.ttf
    - assets/NotoSans-Bold.ttf
    - assets/NotoSans-Italic.ttf
